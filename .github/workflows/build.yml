name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: LouisBrunner/.github/.github/workflows/lint-bun.yml@main
    with:
      run: |
        bun run all

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [test]
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build
        uses: LouisBrunner/.github/.github/actions/build-bun-go@main
        with:
          run: |
            bun i
            bun build:examples

      - name: Upload examples
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: examples

  deploy:
    name: Deploy
    needs: [build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Clean gitignore
        run: |
          # the action doesn't copy files in gitignore
          # so we manually remove the /examples line
          sed -i '/^\/examples/d' .gitignore

      - name: Download examples build
        uses: actions/download-artifact@v8
        with:
          name: Examples
          path: examples
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_jekyll: true
          publish_dir: ./
          force_orphan: true
