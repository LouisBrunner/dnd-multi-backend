name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  all:
    uses: LouisBrunner/.github/.github/workflows/lint-all.yml@main
    permissions:
      actions: read
      contents: read
      statuses: write
      pull-requests: write
